<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JM Transfer Pro - SaaS</title>
    
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@500&display=swap" rel="stylesheet">
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <script src="https://unpkg.com/peerjs@1.4.7/dist/peerjs.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>

    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-auth-compat.js"></script>

    <style>
        :root {
            --bg: #0a0a0a; --surface: #121212; --surface-hover: #1a1a1a;
            --accent: #f59e0b; --success: #10b981; --danger: #ef4444;
            --text: #ffffff; --muted: #a3a3a3; --border: rgba(255, 255, 255, 0.08);
            --glow: rgba(245, 158, 11, 0.15);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
        body { background: var(--bg); color: var(--text); min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 20px; position: relative; }

        .container { 
            background: var(--surface); border: 1px solid var(--border); border-radius: 20px; padding: 40px 35px; width: 100%; max-width: 540px; 
            box-shadow: 0 25px 50px -12px rgba(0,0,0,0.8), 0 0 40px var(--glow); text-align: center; position: relative; overflow: hidden; display: none; flex-direction: column; align-items: center; z-index: 2;
        }
        .container::before { content: ''; position: absolute; top: 0; left: 0; width: 100%; height: 3px; background: linear-gradient(90deg, var(--accent), #ef4444); }
        
        .btn-top-logout { position: absolute; top: 20px; right: 20px; background: transparent; border: none; color: var(--muted); font-size: 14px; font-weight: 600; cursor: pointer; display: flex; align-items: center; gap: 6px; transition: 0.3s; }
        .btn-top-logout:hover { color: var(--danger); transform: translateX(2px); }

        h1 { color: var(--accent); margin-bottom: 4px; font-size: 28px; font-weight: 800; letter-spacing: -1.5px; }
        p.subtitle { color: var(--muted); margin-bottom: 35px; font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 3px; }

        /* DESIGN DO LOGIN APRIMORADO */
        .input-container { position: relative; width: 100%; margin-bottom: 16px; }
        .input-container i { position: absolute; left: 16px; top: 50%; transform: translateY(-50%); color: #888888; font-size: 15px; z-index: 2; }
        .input-container input { 
            width: 100%; background: #141414; border: 1px solid #2a2a2a; 
            padding: 16px 16px 16px 45px; border-radius: 8px; color: var(--text); 
            font-size: 15px; outline: none; transition: all 0.3s ease; position: relative; z-index: 1;
        }
        .input-container input:focus { border-color: var(--accent); background: #1a1a1a; box-shadow: 0 0 0 1px var(--accent); }
        .input-container input::placeholder { color: #555555; }

        /* HACK PARA FORÇAR O FUNDO ESCURO NO AUTOFILL DO NAVEGADOR */
        .input-container input:-webkit-autofill,
        .input-container input:-webkit-autofill:hover, 
        .input-container input:-webkit-autofill:focus, 
        .input-container input:-webkit-autofill:active {
            -webkit-box-shadow: 0 0 0 30px #141414 inset !important;
            -webkit-text-fill-color: var(--text) !important;
            transition: background-color 5000s ease-in-out 0s;
            border: 1px solid #2a2a2a !important;
        }
        
        .btn-login { 
            background: var(--accent); color: #000; border: none; padding: 16px; 
            border-radius: 8px; font-weight: 700; font-size: 16px; width: 100%; 
            cursor: pointer; transition: 0.3s; display: flex; align-items: center; 
            justify-content: center; gap: 10px; margin-top: 10px;
        }
        .btn-login:hover { transform: translateY(-2px); background: #fcd34d; }

        .qr-box { background: #ffffff; padding: 18px; border-radius: 16px; display: inline-flex; flex-direction: column; align-items: center; margin-bottom: 15px; }
        .qr-box p { color: #000; font-size: 10px; font-weight: 800; margin-top: 12px; letter-spacing: 0.5px;}

        .btn-copy-link { background: rgba(255,255,255,0.05); color: var(--muted); border: 1px solid var(--border); padding: 8px 16px; border-radius: 20px; font-size: 11px; font-weight: 600; cursor: pointer; display: flex; align-items: center; gap: 8px; margin-bottom: 25px; transition: all 0.2s ease; text-transform: uppercase;}
        .btn-copy-link:hover { background: rgba(255,255,255,0.1); color: var(--text); border-color: rgba(255,255,255,0.2); }
        .btn-copy-link i { color: var(--accent); }

        .status-header { display: flex; gap: 12px; margin-bottom: 30px; justify-content: center; width: 100%; align-items: center;}
        .status-badge { display: inline-flex; align-items: center; justify-content: center; gap: 8px; padding: 10px 20px; border-radius: 30px; font-weight: 600; font-size: 12px; background: rgba(255,255,255,0.03); border: 1px solid var(--border); margin: 0;}
        .status-badge.connected { background: rgba(16, 185, 129, 0.08); color: var(--success); border-color: rgba(16, 185, 129, 0.2); }

        .btn-disconnect { background: rgba(239, 68, 68, 0.08); color: var(--danger); border: 1px solid rgba(239, 68, 68, 0.2); padding: 10px 20px; border-radius: 30px; display: none; align-items: center; justify-content: center; gap: 8px; cursor: pointer; transition: all 0.3s ease; font-size: 12px; font-weight: 600;}
        .btn-disconnect:hover { background: var(--danger); color: #fff; border-color: var(--danger); box-shadow: 0 4px 15px rgba(239, 68, 68, 0.3); }

        .action-area { display: none; flex-direction: column; gap: 15px; margin-top: 10px; width: 100%; }
        .action-area.show { display: flex; animation: fadeIn 0.5s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .btn-upload { background: var(--accent); color: #000; border: none; padding: 16px; border-radius: 14px; font-weight: 700; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 12px; font-size: 15px; width: 100%; transition: all 0.3s ease; box-shadow: 0 4px 15px rgba(245, 158, 11, 0.2); }
        .btn-upload:hover { transform: translateY(-2px); box-shadow: 0 8px 25px rgba(245, 158, 11, 0.4); background: #fcd34d; }

        .progress-wrapper { display: none; margin-top: 15px; text-align: left; width: 100%; }
        .progress-info { display: flex; justify-content: space-between; font-size: 11px; font-weight: 700; color: var(--accent); margin-bottom: 8px;}
        .progress-container { width: 100%; background: rgba(255,255,255,0.05); border-radius: 10px; height: 6px; overflow: hidden; }
        .progress-bar { height: 100%; background: linear-gradient(90deg, #f59e0b, #fbbf24); width: 0%; transition: width 0.3s ease; }

        .file-list { text-align: left; display: flex; flex-direction: column; gap: 10px; margin-top: 15px; width: 100%; max-height: 350px; overflow-y: auto; padding-right: 5px; }
        .file-list::-webkit-scrollbar { width: 4px; }
        .file-list::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 10px; }

        .file-item { background: var(--surface-hover); border: 1px solid var(--border); border-radius: 14px; padding: 12px; display: flex; align-items: center; gap: 14px; width: 100%; transition: all 0.2s ease;}
        .file-item:hover { border-color: rgba(255,255,255,0.15); }
        
        .file-preview-box { width: 48px; height: 48px; border-radius: 10px; overflow: hidden; background: rgba(0,0,0,0.5); flex-shrink: 0; display: flex; align-items: center; justify-content: center; border: 1px solid rgba(255,255,255,0.05); }
        .file-preview-img { width: 100%; height: 100%; object-fit: cover; }

        .file-main-info { flex: 1; min-width: 0; }
        .file-name { font-weight: 600; font-size: 13px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; margin-bottom: 5px; display: block;}
        
        .raio-x-tags { display: flex; flex-wrap: wrap; gap: 5px; }
        .tag { font-family: 'JetBrains Mono', monospace; font-size: 9px; font-weight: 700; padding: 2px 6px; border-radius: 4px; text-transform: uppercase; }
        .tag-size { background: rgba(255,255,255,0.08); color: #d4d4d4; }
        .tag-res { background: rgba(59, 130, 246, 0.15); color: #60a5fa; }
        .tag-word { background: rgba(37, 99, 235, 0.15); color: #60a5fa; }

        .file-actions { display: flex; gap: 6px; }
        .btn-act { width: 36px; height: 36px; border-radius: 10px; display: flex; align-items: center; justify-content: center; border: 1px solid var(--border); background: rgba(255,255,255,0.02); color: var(--muted); cursor: pointer; transition: all 0.2s ease;}
        .btn-act:hover { color: #fff; background: rgba(255,255,255,0.08); border-color: rgba(255,255,255,0.2); }
        .btn-print:hover { background: rgba(16, 185, 129, 0.1); color: var(--success); border-color: rgba(16, 185, 129, 0.3); }
        .btn-delete:hover { background: rgba(239, 68, 68, 0.1); color: var(--danger); border-color: rgba(239, 68, 68, 0.3); }

        #printFrame { display: none; }
        .dev-credit { position: absolute; bottom: 20px; font-size: 10px; font-weight: 600; color: var(--muted); opacity: 0.3; letter-spacing: 1.5px; text-transform: uppercase; transition: 0.3s; z-index: 1;}
        .dev-credit:hover { opacity: 1; color: var(--accent); }

        .toast { position: fixed; top: 20px; right: 20px; background: rgba(18, 18, 18, 0.95); backdrop-filter: blur(10px); border: 1px solid var(--border); border-left: 4px solid var(--accent); padding: 16px 24px; border-radius: 12px; z-index: 10000; display: flex; align-items: center; gap: 12px; font-weight: 600; font-size: 13px; transform: translateX(150%); transition: 0.4s; }
        .toast.show { transform: translateX(0); }
    </style>
</head>
<body>

    <div id="login-view" class="container">
        <i class="fas fa-shield-alt" style="font-size: 40px; color: var(--accent); margin-bottom: 15px;"></i>
        <h1>ACESSO RESTRITO</h1>
        <p class="subtitle" style="margin-bottom: 25px;">Faça login para operar o balcão</p>

        <div class="input-container">
            <i class="fas fa-envelope"></i>
            <input type="email" id="loginEmail" placeholder="E-mail" autocomplete="username">
        </div>
        
        <div class="input-container">
            <i class="fas fa-key"></i>
            <input type="password" id="loginPass" placeholder="Senha" autocomplete="current-password">
        </div>

        <button class="btn-login" id="btnFazerLogin" onclick="fazerLogin()">
            Entrar no Sistema
        </button>
    </div>

    <div id="pc-view" class="container">
        <button class="btn-top-logout" onclick="fazerLogout()" title="Bloquear Sistema">
            Sair <i class="fas fa-sign-out-alt"></i>
        </button>

        <h1>JM TRANSFER <span style="opacity: 0.2; font-weight: 400;">PRO</span></h1>
        <p class="subtitle">Painel de Recepção</p>

        <div id="qr-container" class="qr-box">
            <div id="qrcode"></div>
            <p>ESCANEIE PARA CONECTAR</p>
        </div>
        <button id="btnCopyLink" class="btn-copy-link" onclick="copySessionLink()"><i class="fas fa-link"></i> Copiar Link WhatsApp</button>

        <div class="status-header">
            <div id="pc-status" class="status-badge"><i class="fas fa-circle-notch fa-spin"></i> AGUARDANDO...</div>
            <button id="pc-disconnect" class="btn-disconnect" onclick="endSessionPC()"><i class="fas fa-power-off"></i> Encerrar</button>
        </div>

        <div id="pc-action" class="action-area">
            <button class="btn-upload" onclick="document.getElementById('pcFileInput').click()">
                <i class="fas fa-paper-plane"></i> ENVIAR ARQUIVO AO CLIENTE
            </button>
            <input type="file" id="pcFileInput" multiple style="display: none;" onchange="handleFiles(this, 'pc')">
            
            <div class="progress-wrapper" id="pc-progress-wrapper">
                <div class="progress-info"><span id="pc-prog-label">PROCESSANDO...</span> <span id="pc-prog-perc">0%</span></div>
                <div class="progress-container"><div class="progress-bar" id="pc-progress-bar"></div></div>
            </div>

            <div class="file-list" id="pc-file-list"></div>
        </div>
    </div>

    <div id="mobile-view" class="container" style="border: none; box-shadow: none;">
        <h1>JM CONNECT</h1>
        <p class="subtitle">BALCÃO DIGITAL</p>
        <div class="status-header"><div class="status-badge connected"><i class="fas fa-shield-check"></i> CONECTADO COM SEGURANÇA</div></div>
        <div id="mobile-action" class="action-area show">
            <button class="btn-upload" onclick="document.getElementById('mobileFileInput').click()"><i class="fas fa-cloud-upload-alt"></i> SELECIONAR ARQUIVOS</button>
            <input type="file" id="mobileFileInput" multiple style="display: none;" onchange="handleFiles(this, 'mobile')">
            <div class="progress-wrapper" id="mobile-progress-wrapper">
                <div class="progress-info"><span id="mobile-prog-label">ENVIANDO...</span> <span id="mobile-prog-perc">0%</span></div>
                <div class="progress-container"><div class="progress-bar" id="mobile-progress-bar"></div></div>
            </div>
            <div class="file-list" id="mobile-file-list" style="margin-top: 25px;"></div>
        </div>
    </div>

    <iframe id="printFrame"></iframe>
    <div class="dev-credit">Desenvolvido por José Marcelo</div>
    <div class="toast" id="toastMsg"><i class="fas fa-check-circle" style="color: var(--success);"></i> <span>Aviso</span></div>

    <script>
        // ==========================================
        // 1. INICIALIZAÇÃO DO FIREBASE (SUAS CHAVES)
        // ==========================================
        const firebaseConfig = {
            apiKey: "AIzaSyCmD4GMmuLbKP0oOP-yu3_m6N1lCUmnljg",
            authDomain: "jm-transfer.firebaseapp.com",
            projectId: "jm-transfer",
            storageBucket: "jm-transfer.firebasestorage.app",
            messagingSenderId: "781704866355",
            appId: "1:781704866355:web:b74476d860bbe91d7f9146"
        };
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();

        const urlParams = new URLSearchParams(window.location.search);
        const remoteId = urlParams.get('remote');
        let peer, conn;
        let sessionUrl = "";
        const isMobile = !!remoteId;

        // ==========================================
        // 2. CONTROLE DE ACESSO (O ESPIÃO)
        // ==========================================
        if (isMobile) {
            document.getElementById('mobile-view').style.display = 'flex';
            iniciarPeerJSCelular();
        } else {
            auth.onAuthStateChanged((user) => {
                if (user) {
                    document.getElementById('login-view').style.display = 'none';
                    document.getElementById('pc-view').style.display = 'flex';
                    if(!peer) iniciarPeerJSPc();
                } else {
                    document.getElementById('login-view').style.display = 'flex';
                    document.getElementById('pc-view').style.display = 'none';
                }
            });

            document.getElementById('loginPass').addEventListener('keypress', function(e) {
                if(e.key === 'Enter') fazerLogin();
            });
        }

        // ==========================================
        // 3. FUNÇÕES DE LOGIN E LOGOUT REAL
        // ==========================================
        function fazerLogin() {
            const emailDigitado = document.getElementById('loginEmail').value;
            const senhaDigitada = document.getElementById('loginPass').value;
            const btn = document.getElementById('btnFazerLogin');

            btn.innerHTML = '<i class="fas fa-circle-notch fa-spin"></i> Verificando...';

            auth.signInWithEmailAndPassword(emailDigitado, senhaDigitada)
                .then((userCredential) => {
                    showToast("Acesso Liberado!");
                    btn.innerHTML = 'Entrar no Sistema';
                    document.getElementById('loginEmail').value = '';
                    document.getElementById('loginPass').value = '';
                })
                .catch((error) => {
                    btn.innerHTML = 'Entrar no Sistema';
                    if(error.code === 'auth/invalid-credential' || error.code === 'auth/user-not-found' || error.code === 'auth/wrong-password'){
                        showToast("Erro: E-mail ou Senha incorretos.");
                    } else {
                        showToast("Erro: Verifique seus dados.");
                    }
                });
        }

        function fazerLogout() {
            auth.signOut().then(() => {
                if(conn) { conn.send({ type: 'command', action: 'disconnect' }); conn.close(); }
                if(peer) { peer.destroy(); peer = null; }
                showToast("Sistema bloqueado com segurança.");
            }).catch((error) => {
                showToast("Erro ao sair.");
            });
        }

        // ==========================================
        // 4. REDE E TRANSFERÊNCIA P2P
        // ==========================================
        function iniciarPeerJSPc() {
            peer = new Peer();
            peer.on('open', (id) => {
                sessionUrl = `${window.location.href.split('?')[0]}?remote=${id}`;
                document.getElementById("qrcode").innerHTML = ""; 
                new QRCode(document.getElementById("qrcode"), { text: sessionUrl, width: 170, height: 170 });
            });
            peer.on('connection', (c) => {
                conn = c; setupConnection(conn, 'pc');
                document.getElementById('qr-container').style.display = 'none';
                document.getElementById('btnCopyLink').style.display = 'none';
                document.getElementById('pc-status').innerHTML = '<i class="fas fa-check-circle"></i> VINCULADO AO CLIENTE';
                document.getElementById('pc-status').classList.add('connected');
                document.getElementById('pc-disconnect').style.display = 'flex';
                document.getElementById('pc-action').classList.add('show');
                showToast("Cliente conectado!");
            });
        }

        function iniciarPeerJSCelular() {
            peer = new Peer();
            peer.on('open', () => {
                conn = peer.connect(remoteId);
                conn.on('open', () => { setupConnection(conn, 'mobile'); });
            });
        }

        function copySessionLink() {
            navigator.clipboard.writeText(sessionUrl).then(() => showToast("Link copiado! Cole no WhatsApp."));
        }

        function endSessionPC() {
            if(conn) { conn.send({ type: 'command', action: 'disconnect' }); }
            setTimeout(() => { 
                if(peer) peer.destroy();
                document.getElementById('pc-action').classList.remove('show');
                document.getElementById('pc-disconnect').style.display = 'none';
                document.getElementById('pc-status').innerHTML = '<i class="fas fa-circle-notch fa-spin"></i> AGUARDANDO...';
                document.getElementById('pc-status').classList.remove('connected');
                document.getElementById('qr-container').style.display = 'inline-flex';
                document.getElementById('btnCopyLink').style.display = 'flex';
                document.getElementById('pc-file-list').innerHTML = '';
                iniciarPeerJSPc();
            }, 600);
        }

        function setupConnection(connection, type) {
            connection.on('data', (data) => { 
                if(data.type === 'file') receiveFile(data, type); 
                if(data.type === 'command' && data.action === 'disconnect') { 
                    document.getElementById('mobile-view').innerHTML = `
                        <i class="fas fa-check-circle" style="font-size: 50px; color: var(--success); margin-bottom: 20px;"></i>
                        <h1 style="text-align:center; color: var(--text);">Sessão Encerrada</h1>
                        <p style="color: var(--muted); margin-top:10px;">Você já pode fechar esta tela.</p>
                    `;
                }
            });
        }

        async function handleFiles(input, type) {
            const files = input.files; if (!files.length || !conn) return;
            const bar = document.getElementById(`${type}-progress-bar`), wrapper = document.getElementById(`${type}-progress-wrapper`);
            wrapper.style.display = 'block';
            
            const file = files[0];
            const reader = new FileReader();
            reader.onload = () => {
                conn.send({ type: 'file', file: reader.result, name: file.name, mime: file.type, size: file.size });
                bar.style.width = '100%'; showToast("Enviado com sucesso!");
                setTimeout(() => { wrapper.style.display = 'none'; bar.style.width='0'; }, 2000);
            };
            reader.readAsArrayBuffer(file);
            input.value = ''; 
        }

        async function receiveFile(data, type) {
            const blob = new Blob([data.file], { type: data.mime });
            const url = URL.createObjectURL(blob);
            const list = document.getElementById(type === 'pc' ? 'pc-file-list' : 'mobile-file-list');
            const fileId = 'file_' + Math.random().toString(36).substr(2, 9);
            
            const item = document.createElement('div');
            item.className = 'file-item'; item.id = fileId;
            
            let tags = `<span class="tag tag-size">${(data.size/1024/1024).toFixed(2)} MB</span>`;
            let preview = `<i class="fas fa-file-alt" style="font-size:22px; color:var(--muted)"></i>`;
            
            const isWord = data.name.toLowerCase().endsWith('.doc') || data.name.toLowerCase().endsWith('.docx');

            if (isWord) {
                preview = `<i class="fas fa-file-word" style="font-size:24px; color:#3b82f6"></i>`;
                tags += `<span class="tag tag-word">WORD</span>`;
            } else if (data.mime.startsWith('image/')) {
                preview = `<img src="${url}" class="file-preview-img">`;
                const img = new Image(); img.src = url; await img.decode();
                tags += `<span class="tag tag-res">${img.naturalWidth}x${img.naturalHeight}</span>`;
            } else if (data.mime === 'application/pdf') {
                preview = `<i class="fas fa-file-pdf" style="font-size:24px; color:var(--danger)"></i>`;
            }

            const safeName = data.name.replace(/'/g, "\\'").replace(/"/g, "&quot;");

            let actionsHTML = '';
            if (type === 'pc') {
                actionsHTML = `
                    <button class="btn-act btn-print" onclick="smartPrint('${url}', '${data.mime}', '${safeName}')" title="Imprimir"><i class="fas fa-print"></i></button>
                    <a href="${url}" download="${data.name}" class="btn-act" title="Baixar"><i class="fas fa-download"></i></a>
                    <button class="btn-act btn-delete" onclick="document.getElementById('${fileId}').remove()" title="Excluir"><i class="fas fa-trash-alt"></i></button>
                `;
            } else {
                actionsHTML = `
                    <a href="${url}" download="${data.name}" class="btn-act"><i class="fas fa-download"></i></a>
                    <button class="btn-act btn-delete" onclick="this.closest('.file-item').remove()"><i class="fas fa-trash-alt"></i></button>
                `;
            }

            item.innerHTML = `
                <div class="file-preview-box">${preview}</div>
                <div class="file-main-info">
                    <span class="file-name" title="${data.name}">${data.name}</span>
                    <div class="raio-x-tags">${tags}</div>
                </div>
                <div class="file-actions">${actionsHTML}</div>`;
            list.prepend(item);
            
            if(type === 'pc') new Audio('https://assets.mixkit.co/active_storage/sfx/2869/2869-preview.mp3').play().catch(()=>{});
        }

        function smartPrint(url, mime, name) {
            const isWord = name.toLowerCase().endsWith('.doc') || name.toLowerCase().endsWith('.docx');
            if (isWord) {
                showToast("Iniciando Download...");
                const a = document.createElement('a'); a.href = url; a.download = name; a.click();
                return;
            }
            const frame = document.getElementById('printFrame');
            const doc = frame.contentWindow.document;
            doc.open();
            if (mime.startsWith('image/')) {
                doc.write(`<style>body{margin:0;display:flex;align-items:center;justify-content:center;height:100vh;}img{max-width:190mm;max-height:270mm;object-fit:contain;}@page{size:A4;margin:10mm;}</style><body><img src="${url}"></body>`);
                doc.close(); setTimeout(() => { frame.contentWindow.focus(); frame.contentWindow.print(); }, 500);
            } else if (mime === 'application/pdf') {
                frame.src = url; frame.onload = () => { frame.contentWindow.print(); };
            } else {
                showToast("Impressão direta não suportada.");
            }
        }

        function showToast(msg) {
            const t = document.getElementById('toastMsg'); t.querySelector('span').innerText = msg;
            t.classList.add('show'); setTimeout(() => t.classList.remove('show'), 3500);
        }
    </script>
</body>
</html>
